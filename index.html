<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendi Marzikri - Cloud</title>
  <style>
    :root {
      --bg: #121212;
      --bg-secondary: #1b1b1b;
      --bg-card: #202020;
      --bg-popup: #252525;
      --bg-hover: #2d2d2d;
      --bg-active: #3a3a3a;
      --text: #ffffff;
      --text-secondary: #c8c8c8;
      --text-muted: #9a9a9a;
      --text-disabled: #666666;
      --border: #3b3b3b;
      --border-light: #505050;
      --border-focus: #4f8cff;
      --primary: #4f8cff;
      --primary-hover: #6aa1ff;
      --primary-active: #2f73f5;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --info: #58a6ff;
      --button-bg: var(--primary);
      --button-text: #ffffff;
      --button-hover: var(--primary-hover);
      --button-active: var(--primary-active);
      --button-disabled: #555555;
      --input-bg: #1f1f1f;
      --input-text: #ffffff;
      --input-placeholder: #888888;
      --input-border: #444444;
      --link: #6ca8ff;
      --link-hover: #94c2ff;
      --shadow: rgba(0, 0, 0, 0.35);
      --overlay: rgba(0, 0, 0, 0.6);
      --scrollbar: #555555;
      --scrollbar-hover: #777777;
      --selection-bg: #3d6fe0;
      --selection-text: #ffffff;
    }
    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      font-family: system-ui, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }
    h1 {
      text-align: center;
      color: var(--primary);
      transition: .2s ease-in-out;
    }
    h1:hover {
      color: var(--primary-hover);
    }
  </style>
</head>
<body>
  <h1>Rendi Marzikri - Cloud</h1>
</body>
</html>
